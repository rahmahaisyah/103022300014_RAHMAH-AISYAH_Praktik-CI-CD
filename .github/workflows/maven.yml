# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write 
  packages: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
          fetch-depth: 0
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Continuous Integration (Compile)
      run: mvn -B clean compile

    - name: Continuous Testing (Unit Test)
      run: mvn -B test

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

    - name: Continuous Inspection (SonarCloud) 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=rahmahaisyah-1 -Dsonar.projectKey=rahmahaisyah_103022300014_RAHMAH-AISYAH_Praktik-CI-CD -Dsonar.qualitygate.wait=true

    - name: Package Application
      run: mvn -B clean package -DskipTests

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RAHMAH-AISYAH_Praktik-CI-CD
        path: target/*.jar

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0-${{ github.run_number }}
        files: target/*.jar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to GitHub Packages
      run: mvn -B deploy -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
